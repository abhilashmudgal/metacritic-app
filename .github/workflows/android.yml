name: Build APK from Scratch

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Android Project Configurations
        run: |
          mkdir -p app/src/main/java/com/example/metacriticapp
          mkdir -p app/src/main/res/values

          # settings.gradle.kts
          cat << 'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MetacriticApp"
          include(":app")
          EOF

          # Root build.gradle.kts
          cat << 'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          # App build.gradle.kts
          cat << 'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.example.metacriticapp"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.example.metacriticapp"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildFeatures {
                  compose = true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.15"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.4")
              implementation("androidx.activity:activity-compose:1.9.1")
              
              implementation(platform("androidx.compose:compose-bom:2024.09.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.material3:material3")
              
              implementation("androidx.compose.animation:animation:1.7.0")
              implementation("androidx.navigation:navigation-compose:2.8.0")
              implementation("org.jsoup:jsoup:1.17.2")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
              implementation("io.coil-kt:coil-compose:2.6.0")
          }
          EOF

          # AndroidManifest.xml
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="My Metacritic"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate Kotlin Code
        run: |
          cat << 'EOF' > app/src/main/java/com/example/metacriticapp/MainActivity.kt
          package com.example.metacriticapp

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.animation.AnimatedVisibilityScope
          import androidx.compose.animation.ExperimentalSharedTransitionApi
          import androidx.compose.animation.SharedTransitionLayout
          import androidx.compose.animation.SharedTransitionScope
          import androidx.compose.foundation.background
          import androidx.compose.foundation.clickable
          import androidx.compose.foundation.isSystemInDarkTheme
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.automirrored.filled.ArrowBack
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.layout.ContentScale
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewModelScope
          import androidx.lifecycle.viewmodel.compose.viewModel
          import androidx.navigation.NavType
          import androidx.navigation.compose.NavHost
          import androidx.navigation.compose.composable
          import androidx.navigation.compose.rememberNavController
          import androidx.navigation.navArgument
          import coil.compose.AsyncImage
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          import org.jsoup.Jsoup

          data class MediaItem(val id: String, val title: String, val score: Int, val imageUrl: String, val description: String)

          class ScraperViewModel : ViewModel() {
              var mediaList by mutableStateOf<List<MediaItem>>(emptyList())
                  private set
              var isLoading by mutableStateOf(true)
                  private set

              init { loadData() }

              private fun loadData() {
                  viewModelScope.launch {
                      isLoading = true
                      val urlsToScrape = listOf(
                          "https://www.metacritic.com/movie/shutter-island/",
                          "https://www.metacritic.com/movie/interstellar/",
                          "https://www.metacritic.com/movie/the-prestige/",
                          "https://www.metacritic.com/movie/andhadhun/"
                      )
                      val results = mutableListOf<MediaItem>()
                      for (url in urlsToScrape) {
                          val item = scrapeMetacritic(url)
                          if (item != null) results.add(item)
                      }
                      mediaList = results
                      isLoading = false
                  }
              }

              private suspend fun scrapeMetacritic(url: String): MediaItem? {
                  return withContext(Dispatchers.IO) {
                      try {
                          val document = Jsoup.connect(url)
                              .userAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
                              .timeout(10000).get()

                          val title = document.selectFirst("div.c-productHero_title h1")?.text() ?: "Unknown Title"
                          val score = document.selectFirst("div.c-productScoreInfo_scoreNumber span")?.text()?.toIntOrNull() ?: 0
                          val description = document.selectFirst("meta[name=description]")?.attr("content") ?: "No description"
                          val imageUrl = document.selectFirst("meta[property=og:image]")?.attr("content") ?: ""

                          MediaItem(url.hashCode().toString(), title, score, imageUrl, description)
                      } catch (e: Exception) { null }
                  }
              }
          }

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      val colors = if (isSystemInDarkTheme()) darkColorScheme() else lightColorScheme()
                      MaterialTheme(colorScheme = colors) { 
                          Surface(modifier = Modifier.fillMaxSize(), color = MaterialTheme.colorScheme.background) { 
                              MetacriticApp() 
                          } 
                      }
                  }
              }
          }

          @OptIn(ExperimentalSharedTransitionApi::class)
          @Composable
          fun MetacriticApp(viewModel: ScraperViewModel = viewModel()) {
              val navController = rememberNavController()
              SharedTransitionLayout {
                  NavHost(navController = navController, startDestination = "list") {
                      composable("list") {
                          ListScreen(viewModel, this@SharedTransitionLayout, this@composable) { itemId -> navController.navigate("detail/$itemId") }
                      }
                      composable("detail/{itemId}", arguments = listOf(navArgument("itemId") { type = NavType.StringType })) { backStackEntry ->
                          val item = viewModel.mediaList.find { it.id == backStackEntry.arguments?.getString("itemId") }
                          if (item != null) DetailScreen(item, this@SharedTransitionLayout, this@composable) { navController.popBackStack() }
                      }
                  }
              }
          }

          @OptIn(ExperimentalSharedTransitionApi::class, ExperimentalMaterial3Api::class)
          @Composable
          fun ListScreen(viewModel: ScraperViewModel, sharedTransitionScope: SharedTransitionScope, animatedVisibilityScope: AnimatedVisibilityScope, onItemClick: (String) -> Unit) {
              Scaffold(topBar = { CenterAlignedTopAppBar(title = { Text("My Metacritic", fontWeight = FontWeight.Bold) }, colors = TopAppBarDefaults.centerAlignedTopAppBarColors(containerColor = MaterialTheme.colorScheme.surfaceVariant)) }) { paddingValues ->
                  Box(modifier = Modifier.fillMaxSize().padding(paddingValues)) {
                      if (viewModel.isLoading) CircularProgressIndicator(modifier = Modifier.align(Alignment.Center))
                      else LazyColumn(contentPadding = PaddingValues(16.dp), verticalArrangement = Arrangement.spacedBy(16.dp)) {
                          items(viewModel.mediaList) { item ->
                              with(sharedTransitionScope) {
                                  ElevatedCard(modifier = Modifier.fillMaxWidth().clickable { onItemClick(item.id) }.sharedElement(rememberSharedContentState("card_${item.id}"), animatedVisibilityScope)) {
                                      Row(modifier = Modifier.padding(16.dp), verticalAlignment = Alignment.CenterVertically) {
                                          AsyncImage(model = item.imageUrl, contentDescription = null, contentScale = ContentScale.Crop, modifier = Modifier.size(80.dp).clip(RoundedCornerShape(8.dp)).sharedElement(rememberSharedContentState("image_${item.id}"), animatedVisibilityScope))
                                          Spacer(modifier = Modifier.width(16.dp))
                                          Column(modifier = Modifier.weight(1f)) { Text(item.title, style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold, maxLines = 2, overflow = TextOverflow.Ellipsis, modifier = Modifier.sharedBounds(rememberSharedContentState("title_${item.id}"), animatedVisibilityScope)) }
                                          Spacer(modifier = Modifier.width(8.dp))
                                          ScoreBadge(item.score)
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }

          @OptIn(ExperimentalSharedTransitionApi::class, ExperimentalMaterial3Api::class)
          @Composable
          fun DetailScreen(item: MediaItem, sharedTransitionScope: SharedTransitionScope, animatedVisibilityScope: AnimatedVisibilityScope, onBack: () -> Unit) {
              with(sharedTransitionScope) {
                  Scaffold(
                      topBar = { TopAppBar(title = { }, navigationIcon = { IconButton(onClick = onBack) { Icon(Icons.AutoMirrored.Filled.ArrowBack, "Back") } }, colors = TopAppBarDefaults.topAppBarColors(containerColor = Color.Transparent)) },
                      modifier = Modifier.sharedElement(rememberSharedContentState("card_${item.id}"), animatedVisibilityScope)
                  ) { paddingValues ->
                      Column(modifier = Modifier.fillMaxSize().padding(paddingValues).background(MaterialTheme.colorScheme.background)) {
                          AsyncImage(model = item.imageUrl, contentDescription = null, contentScale = ContentScale.Crop, modifier = Modifier.fillMaxWidth().height(300.dp).sharedElement(rememberSharedContentState("image_${item.id}"), animatedVisibilityScope))
                          Column(modifier = Modifier.padding(24.dp)) {
                              Row(modifier = Modifier.fillMaxWidth(), horizontalArrangement = Arrangement.SpaceBetween, verticalAlignment = Alignment.CenterVertically) {
                                  Text(item.title, style = MaterialTheme.typography.headlineLarge, fontWeight = FontWeight.Bold, modifier = Modifier.weight(1f).sharedBounds(rememberSharedContentState("title_${item.id}"), animatedVisibilityScope))
                                  Spacer(modifier = Modifier.width(16.dp))
                                  ScoreBadge(item.score)
                              }
                              Spacer(modifier = Modifier.height(24.dp))
                              Text("Summary", style = MaterialTheme.typography.titleMedium, color = MaterialTheme.colorScheme.primary)
                              Spacer(modifier = Modifier.height(8.dp))
                              Text(item.description, style = MaterialTheme.typography.bodyLarge, lineHeight = 24.sp)
                          }
                      }
                  }
              }
          }

          @Composable
          fun ScoreBadge(score: Int) {
              val scoreColor = when {
                  score >= 80 -> Color(0xFF66CC33)
                  score >= 50 -> Color(0xFFFFCC33)
                  else -> Color(0xFFFF0000)
              }
              Box(modifier = Modifier.size(48.dp).clip(RoundedCornerShape(8.dp)).background(scoreColor), contentAlignment = Alignment.Center) {
                  Text(score.toString(), color = Color.White, fontWeight = FontWeight.Bold, fontSize = 18.sp)
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
